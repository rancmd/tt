<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#EEF0EB" />
  <title>Time Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="timer" />
  <link rel="manifest" href="/site.webmanifest" />
</head>
<body>

<div id="app">

  <div class="header">
    <div class="header-date" id="header-date">—</div>
  </div>

  <div class="circle-section">
    <div class="circle-wrap" id="circle-wrap">

      <svg class="circle-svg" viewBox="0 0 290 290" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- INNER ring r=108: 4 quarters = 4 hours -->
        <!-- C=678.58, arc=159.47, rest=519.12 -->
        <circle class="ring-inner-bg" cx="145" cy="145" r="108" />
        <circle class="ring-quarter" id="q1" cx="145" cy="145" r="108"
          stroke-dasharray="159.47 519.12" stroke-dashoffset="678.58" style="opacity:0" />
        <circle class="ring-quarter" id="q2" cx="145" cy="145" r="108"
          stroke-dasharray="159.47 519.12" stroke-dashoffset="508.94" style="opacity:0" />
        <circle class="ring-quarter" id="q3" cx="145" cy="145" r="108"
          stroke-dasharray="159.47 519.12" stroke-dashoffset="339.29" style="opacity:0" />
        <circle class="ring-quarter" id="q4" cx="145" cy="145" r="108"
          stroke-dasharray="159.47 519.12" stroke-dashoffset="169.65" style="opacity:0" />

        <!-- OUTER ring r=128: 60-min sweep -->
        <g id="ticks"></g>
        <circle class="ring-outer-bg"  cx="145" cy="145" r="128" />
        <circle class="ring-outer-prog" id="ring-outer" cx="145" cy="145" r="128"
          stroke-dasharray="804" stroke-dashoffset="804" />
      </svg>

      <button class="circle-btn" id="circle-btn" aria-label="Open activity menu">
        <span class="circle-label">SCREEN TIME</span>
        <span class="circle-value" id="balance-val">0</span>
        <span class="circle-unit">minutes</span>
      </button>

      <svg class="reset-ring-svg" viewBox="0 0 290 290" id="reset-svg" style="opacity:0;">
        <circle class="reset-ring" id="reset-ring" cx="145" cy="145" r="136"
          stroke-dasharray="855" stroke-dashoffset="855" />
      </svg>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Today's Log</span>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">No activity logged today</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-backdrop" id="overlay-backdrop"></div>
  <div class="overlay-sheet" id="overlay-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-subtitle">Tap a category — each tap = 15 min</div>
    <div class="categories-row">
      <div class="cat-col-wrap">
        <div class="col-label earn">+ Earn</div>
        <div class="cat-col" id="earn-col"></div>
      </div>
      <div class="cat-col-wrap">
        <div class="col-label spend">− Use</div>
        <div class="cat-col" id="spend-col"></div>
      </div>
    </div>
    <button class="confirm-btn" id="confirm-btn" onclick="confirmLog()" disabled>Confirm</button>
    <div class="warning" id="confirm-warning"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
(function () {
  const cx = 145, cy = 145;
  const ticks = document.getElementById('ticks');
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isMaj = i % 5 === 0;
    const rO = 128;
    const inner = rO - (isMaj ? 10 : 5);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx + inner * Math.cos(angle));
    line.setAttribute('y1', cy + inner * Math.sin(angle));
    line.setAttribute('x2', cx + (rO - 1) * Math.cos(angle));
    line.setAttribute('y2', cy + (rO - 1) * Math.sin(angle));
    line.setAttribute('stroke', 'rgba(26,28,24,0.12)');
    line.setAttribute('stroke-width', isMaj ? 1.5 : 0.8);
    line.setAttribute('stroke-linecap', 'round');
    ticks.appendChild(line);
  }
})();
</script>
</body>
</html>
