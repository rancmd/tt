<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#EEF0EB" />
  <title>Time Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-title">TIME TRACKER</div>
    <div class="header-date" id="header-date">—</div>
  </div>

  <!-- Circle -->
  <div class="circle-section">
    <div class="circle-wrap" onclick="openOverlay('earn')">
      <svg class="circle-svg" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Tick marks -->
        <g id="ticks"></g>
        <!-- Track ring -->
        <circle class="ring-bg" cx="110" cy="110" r="96" />
        <!-- Progress ring -->
        <circle
          class="ring-progress"
          id="ring-progress"
          cx="110" cy="110" r="96"
          stroke-dasharray="603"
          stroke-dashoffset="603"
        />
      </svg>
      <button class="circle-btn" aria-label="Open activity menu">
        <span class="circle-label">SCREEN TIME</span>
        <span class="circle-value" id="balance-val">0</span>
        <span class="circle-unit">minutes</span>
      </button>
    </div>
    <div class="circle-hint">Tap to earn or use time</div>
  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Today's Log</span>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">No activity logged today</div>
    </div>
  </div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-backdrop" id="overlay-backdrop"></div>
  <div class="overlay-sheet" id="overlay-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">Earn Screen Time</div>
    <div class="sheet-subtitle" id="sheet-subtitle">Tap activities — each tap = 15 min</div>

    <div class="categories-row">
      <!-- Earn column -->
      <div>
        <div class="col-label earn">+ Earn</div>
        <div class="cat-col" id="earn-col"></div>
      </div>
      <!-- Spend column -->
      <div>
        <div class="col-label spend">− Use</div>
        <div class="cat-col" id="spend-col"></div>
      </div>
    </div>

    <!-- Confirm -->
    <div class="confirm-area">
      <div class="confirm-summary">
        <div class="confirm-total" id="confirm-total">0 <span>min</span></div>
        <div class="confirm-breakdown" id="confirm-breakdown"></div>
      </div>
      <button class="confirm-btn" id="confirm-btn" onclick="confirmLog()" disabled>
        Tap to select
      </button>
    </div>
    <div class="warning" id="confirm-warning"></div>

  </div>
</div>

<script src="app.js"></script>
<script>
  // Draw tick marks on SVG
  const ticks = document.getElementById('ticks');
  const cx = 110, cy = 110, r = 96;
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * 2 * Math.PI - Math.PI / 2;
    const isMaj = i % 5 === 0;
    const inner = r - (isMaj ? 8 : 4);
    const outer = r - 1;
    const x1 = cx + inner * Math.cos(angle);
    const y1 = cy + inner * Math.sin(angle);
    const x2 = cx + outer * Math.cos(angle);
    const y2 = cy + outer * Math.sin(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', 'rgba(26,28,24,0.12)');
    line.setAttribute('stroke-width', isMaj ? 1.5 : 0.8);
    line.setAttribute('stroke-linecap', 'round');
    ticks.appendChild(line);
  }
</script>
</body>
</html>
